# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key a send-prefix
bind-key C-a last-window
bind-key C-p previous-window


# Renumber windows on close
set-option -g renumber-windows on

set-option -g base-index 1
set-window-option -g pane-base-index 1

# split panes using vim-like keybinds
# Some Options copied from examples in https://gist.github.com/tsl0922/d79fc1f8097dde660b3
bind v split-window -h -c "#{pane_current_path}"
bind s split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %
# swap window to left or right
bind-key -r < swap-window -d -t -1
bind-key -r > swap-window -d -t +1
# Move status bar to top of pane
set-option -g status-position top

# Open new windows in current path
bind c new-window -c "#{pane_current_path}"

# Rebind Session management to S as its taken for window splitting
bind S choose-tree

# Vim Window navigation
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# Enable mouse mode
set -g mouse on

# reload config file (change file location to your the tmux.conf you want to use)
bind r source-file ~/.tmux.conf


# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'
set -g @plugin 'omerxx/tmux-sessionx'

# Plugin Settings
set -g @sessionx-bind 'o'

# Set Colour overrides for Gnome and Alacritty to work with nvim themes properly
set-option -ga terminal-overrides ",xterm-256color:Tc,alacritty:Tc"

# ========================
# Carbonfox Colour Scheme
# ========================
set -g mode-style "fg=#161616,bg=#78a9ff,bold"
set -g message-style "fg=#161616,bg=#78a9ff,bold"
set -g message-command-style "fg=#161616,bg=#78a9ff,bold"

# Pane border colours - subtle but noticeable boundary
set -g pane-border-style "fg=#6c7a89"
set -g pane-active-border-style "fg=#33b1ff,bg=default"

# Status bar colours
set -g status-style "fg=#dfdfe0,bg=#282828"
set -g status-left-style "fg=#161616,bg=#78a9ff,bold"
set -g status-right-style "fg=#dfdfe0,bg=#282828"

# Window status
set -g window-status-style "fg=#dfdfe0,bg=#282828"
set -g window-status-current-style "fg=#161616,bg=#33b1ff,bold"
set -g window-status-activity-style "fg=#78a9ff,bg=#282828"

# Clock
set -g clock-mode-colour "#33b1ff"

# Status sections
set -g status-left "#[fg=#161616,bg=#78a9ff]#{?client_prefix,#[bg=#ee5396],} #S #[fg=#78a9ff,bg=#282828]\ue0b0"
set -g status-right "#[fg=#dfdfe0,bg=#282828] 󰦪 %Y-%m-%d 󱑆 %H:%M "

# Window status format with powerline-style triangular separators
setw -g window-status-format "#[fg=#282828,bg=#282828]\ue0b0#[fg=#dfdfe0,bg=#282828] #I #W #[fg=#282828,bg=#282828]\ue0b0"
setw -g window-status-current-format "#[fg=#282828,bg=#33b1ff]\ue0b0#[fg=#161616,bg=#33b1ff,bold] #I #W #[fg=#33b1ff,bg=#282828]\ue0b0"

# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
