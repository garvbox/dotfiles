# Allow common read-only exploration and status commands

# File listing
[[rule]]
toolName = "run_shell_command"
commandPrefix = "ls"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "cat"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "find"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "grep"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "wc"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "sed"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "sort"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "diff"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "head"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "tail"
decision = "allow"
priority = 100

# Git status and inspection
[[rule]]
toolName = "run_shell_command"
commandPrefix = "git status"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "git diff"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "git log"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "git show"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "git branch"
decision = "allow"
priority = 100

# GitHub CLI inspection
[[rule]]
toolName = "run_shell_command"
commandPrefix = "gh issue list"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "gh issue view"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "gh pr list"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "gh pr view"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "cargo"
decision = "allow"
priority = 100

[[rule]]
toolName = "run_shell_command"
commandPrefix = "cargo publish"
decision = "deny"
priority = 1000
